apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "campusos.fullname" . }}-gateway
  labels:
    {{- include "campusos.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "campusos.name" . }}-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "campusos.name" . }}-gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag | default .Chart.AppVersion }}"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          env:
            - name: AUTH_SERVICE_URL
              value: "http://{{ include "campusos.fullname" . }}-auth:4001"
            - name: ATTENDANCE_SERVICE_URL
              value: "http://{{ include "campusos.fullname" . }}-attendance:4002"
