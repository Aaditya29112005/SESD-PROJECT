version: '3.8'

services:
  # ------------------------------------
  # FRONTEND (React / Vite)
  # ------------------------------------
  dashboard-web:
    build: 
      context: .
      dockerfile: ./apps/dashboard-web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - campus_network

  # ------------------------------------
  # API GATEWAY (Apollo Federation / Node)
  # ------------------------------------
  gateway:
    build:
      context: .
      dockerfile: ./apps/gateway/Dockerfile
    ports:
      - "4000:4000"
    networks:
      - campus_network

  # ------------------------------------
  # MICROSERVICES (Python / FastAPI)
  # ------------------------------------
  attendance-service:
    build:
      context: .
      dockerfile: ./apps/attendance-service/Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka
    networks:
      - campus_network

  dashboard-service:
    build:
      context: .
      dockerfile: ./apps/dashboard-service/Dockerfile
    networks:
      - campus_network

  ai-orchestrator:
    build:
      context: .
      dockerfile: ./apps/ai-orchestrator/Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka
    networks:
      - campus_network

  # ------------------------------------
  # INFRASTRUCTURE (State & Events)
  # ------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: campusos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - campus_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - campus_network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    networks:
      - campus_network

networks:
  campus_network:
    driver: bridge

volumes:
  postgres_data:
